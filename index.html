<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Raj Cold Drink Center, Bodla</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 10px; }
        .card { max-width: 400px; margin: auto; }
        .header { text-align: center; color: #4caf50; }
        .item-card { background: #2a2a2a; padding: 12px; margin-bottom: 10px; border-radius: 10px; }
        .btn-price { border: none; padding: 6px 10px; margin: 2px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; border: 2px solid transparent; }
        .btn-qty { border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; background: #555; color: white; font-weight: bold; }
        .selected { border-color: #fff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="header">🥤 Raj Cold Drink Center, Bodla</h2>
        <div id="itemsContainer"></div>
        <button style="width:100%; padding:15px; background:#25d366; border:none; color:white; font-weight:bold; border-radius:5px;" onclick="alert('Order Placed!')">ORDER NOW</button>
    </div>

    <script>
        const drinks = [
            {name: "Sprite(250ml)", p: [["#4caf50", "Peti W ₹490"], ["#2196f3", "Peti W/O ₹460"], ["#ffc107", "Piece ₹20"]]},
            {name: "Maaza", p: [["#4caf50", "Peti W ₹520"], ["#2196f3", "Peti W/O ₹720"], ["#ffc107", "Piece ₹25"]]},
            {name: "Sting", p: [["#4caf50", "Peti W ₹450"], ["#2196f3", "Peti W/O ₹450"], ["#ffc107", "Piece ₹20"]]},
            {name: "Kinley", p: [["#4caf50", "Peti W ₹180"], ["#2196f3", "Peti W/O ₹180"], ["#ffc107", "Piece ₹20"]]},
            {name: "Bisleri", p: [["#4caf50", "Peti W ₹380"], ["#2196f3", "Peti W/O ₹380"], ["#ffc107", "Piece ₹20"]]},
            {name: "Appy Fizz", p: [["#4caf50", "Peti W ₹500"], ["#2196f3", "Peti W/O ₹500"], ["#ffc107", "Piece ₹20"]]},
            {name: "Coca Cola", p: [["#4caf50", "Peti W ₹600"], ["#2196f3", "Peti W/O ₹600"], ["#ffc107", "Piece ₹20"]]},
            {name: "Frooti (₹5)", p: [["#4caf50", "Peti W ₹100"], ["#2196f3", "Peti W/O ₹100"], ["#ffc107", "Piece ₹5"]]}
        ];

        const container = document.getElementById('itemsContainer');
        drinks.forEach((d) => {
            let btns = d.p.map(p => `<button class="btn-price" style="background:${p[0]}" onclick="select(this)">${p[1]}</button>`).join('');
            container.innerHTML += `
            <div class="item-card">
                <strong>${d.name}</strong><br>
                <div style="margin: 8px 0;">${btns}</div>
                <div>
                    <button class="btn-qty" onclick="change(this, -1)">-</button>
                    <span class="count" style="margin:0 15px;">0</span>
                    <button class="btn-qty" onclick="change(this, 1)">+</button>
                </div>
            </div>`;
        });

        function select(btn) {
            btn.parentElement.querySelectorAll('.btn-price').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function change(btn, val) {
            let span = btn.parentElement.querySelector('.count');
            let count = parseInt(span.innerText) + val;
            if (count >= 0) span.innerText = count;
        }
    </script>
</body>
</html>
