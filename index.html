<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj Cold Drink Center, Bodla</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 10px; }
        .card { max-width: 400px; margin: auto; }
        .header { text-align: center; color: #4caf50; }
        .input-field { width: 100%; padding: 10px; margin: 5px 0; background: #333; border: none; color: white; border-radius: 5px; }
        .item-card { background: #2a2a2a; padding: 10px; margin-bottom: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .btn-qty { border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; background: #555; color: white; font-weight: bold; }
        .btn-order { width: 100%; padding: 15px; background: #25d366; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="header">🥤 Raj Cold Drink Center, Bodla</h2>
        <input type="text" class="input-field" placeholder="Dukaan ka Naam">
        <input type="text" class="input-field" placeholder="Tumhara Naam">
        <input type="text" class="input-field" placeholder="Pata (Address)">
        <input type="number" class="input-field" placeholder="Mobile Number">

        <div id="itemsContainer"></div>

        <button class="btn-order" onclick="alert('Order received!')">ORDER NOW</button>
    </div>

    <script>
        const drinks = [
            {name: "Sprite(250ml)", color: "#4caf50"},
            {name: "Maaza", color: "#ffc107"},
            {name: "Sting", color: "#f44336"},
            {name: "Kinley", color: "#2196f3"},
            {name: "Bisleri", color: "#00bcd4"},
            {name: "Appy Fizz", color: "#795548"},
            {name: "Coca Cola", color: "#d32f2f"},
            {name: "Frooti (₹5)", color: "#ff9800"}
        ];

        const container = document.getElementById('itemsContainer');
        drinks.forEach((d) => {
            container.innerHTML += `
            <div class="item-card">
                <div style="width:40px; height:40px; border-radius:50%; background:${d.color}"></div>
                <div>
                    <strong>${d.name}</strong><br>
                    <button class="btn-qty" onclick="updateCount(this, -1)">-</button>
                    <span class="count" style="margin:0 10px;">0</span>
                    <button class="btn-qty" onclick="updateCount(this, 1)">+</button>
                </div>
            </div>`;
        });

        function updateCount(btn, val) {
            let span = btn.parentElement.querySelector('.count');
            let count = parseInt(span.innerText) + val;
            if (count >= 0) span.innerText = count;
        }
    </script>
</body>
</html>
